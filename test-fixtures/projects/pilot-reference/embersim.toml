# RVP-001 — EmberSim Reference Validation Project
#
# This is the canonical reference firmware for EmberSim. Every release
# must pass RVP-001 before shipping. If this project ever fails to build,
# execute, or produce a deterministic trace, the release is blocked.
#
# See: docs/RVP001_SPEC.md and docs/RVP001_ACCEPTANCE.md
#
# NOTE: main.c is intentionally excluded from EmberSim sources.
# EmberSim uses host_main.c (generated by 'embersim init') which provides
# its own main(). board.c provides the peripheral handles and BSP init
# functions shared by both builds.

[project]
name = "rvp-001"
description = "EmberSim Reference Validation Project — industrial motor controller + sensor node"

[build]
# Source files compiled for simulation.
# board.c:        BSP layer — peripheral handles + board_init()
# app.c:          application core — app_init() + app_run()
# host_main.c:    EmberSim host runner — provides main(), calls app_init()/app_run()
sources = [
    "firmware/Core/Src/board.c",
    "firmware/Core/Src/app.c",
    "firmware/Core/Src/uart_service.c",
    "firmware/Core/Src/motor_control.c",
    "firmware/Core/Src/sensor.c",
    "ember_sim/host_main.c",
]

# Include paths needed to resolve #include directives.
# - firmware/Core/Inc:          firmware headers (board.h, app.h, etc.)
# - firmware/Drivers/.../Inc:   HAL header (stm32f4xx_hal.h) for types + macros
# - ember_sim/mocks:            generated mock headers (mock_hal.h, mock_tim.h, etc.)
includes = [
    "firmware/Core/Inc",
    "firmware/Drivers/STM32F4xx_HAL_Driver/Inc",
    "ember_sim/mocks",
]

[simulation]
entry = "app_init"
trace = "trace.jsonl"
duration_ms = 100
